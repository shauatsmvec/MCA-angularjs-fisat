<!DOCTYPE html>
<html ng-app="campus360">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus360 Dashboard</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="node_modules/angular/angular.min.js"></script>
    <script src="js/app.js"></script>
</head>

<body ng-controller="dashboardcontroller">

    <h1>Campus360 Dashboard</h1>

    <hr>

    <label>College Name</label>
    <br>
    <input type="text" ng-model="collegename">

    <h2>{{collegename}}</h2>

    <hr>

    <label>Total Students</label>
    <br>
    <input type="number" ng-model="totalStudents">

    <button ng-click="totalStudents = totalStudents + 1">
        Add Student
    </button>

    <p ng-class="{
        'green': totalStudents >= 1000,
        'red': totalStudents < 1000
    }">
        Total Students : {{totalStudents}}
    </p>

    <hr>

    <label>Total Faculty</label>
    <br>
    <input type="number" ng-model="totalFaculty">

    <button ng-click="totalFaculty = totalFaculty + 1">
        Add Faculty
    </button>

    <p ng-style="{
    
        'color': totalFaculty >= 100 ? 'green' : 'red',
        'font-size':'25px',
        'font-weight':'bold'}">
        Total Faculty : {{totalFaculty}}
    </p>

    <hr>

    <h2>Student List</h2>

    <ul>
        <li ng-repeat="student in students">
            {{student}}
        </li>
    </ul>

</body>

</html>
